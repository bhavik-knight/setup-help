# --- Shell ---
# Forces the shell to load correctly (Zorin/Fish specific)
shell /usr/bin/zsh --login

# --- Fonts ---
# Kitty uses a different fallback system. You define the main family, 
# and it picks up symbols from Nerd Fonts automatically.
font_family      ComicShannsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        13.0

# Fallback fonts: Kitty handles these via 'symbol_map' if needed, 
# but usually, having the fonts installed on the system is enough.

# --- Window Layout & Behavior ---
remember_window_size  yes
window_padding_width  4
confirm_os_window_close 0

# Maximize on startup: In Kitty, this is usually handled by the OS 
# or by starting with: 
kitty --start-as=maximized
#
# To do it in config (Linux/X11/Wayland):
linux_display_server auto

# Window decorations (Zorin/GNOME look)
hide_window_decorations no
# Custom Title (Kitty uses a static title or shell-driven title)
# Note: Kitty usually dynamic, but you can set a default:
window_title 🐟 Fish Terminal

# --- Background ---
background_opacity 0.92

# --- Tab Bar ---
tab_bar_edge            top
tab_bar_style           powerline
tab_powerline_style     round
tab_title_template      "{index}: {title}"
tab_bar_min_tabs        1

# --- Key Bindings ---
# Map SHIFT+CMD+T to Tab Navigator (In Kitty, this is 'select_tab')
map cmd+shift+t select_tab

# Close current tab without confirmation (Shift+Ctrl+W)
map ctrl+shift+w close_tab

# --- Mouse Bindings ---
# Close tab with CTRL + Left Click
mouse_map ctrl+left release ungrabbed close_tab

# BEGIN_KITTY_THEME
# Dracula
include current-theme.conf
# END_KITTY_THEME

